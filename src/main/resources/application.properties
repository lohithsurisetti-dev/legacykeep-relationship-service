# =============================================================================
# LegacyKeep Relationship Service - Main Configuration
# =============================================================================

# Server Configuration
server.port=8083
server.servlet.context-path=/api/v1

# Application Information
spring.application.name=relationship-service
info.app.name=LegacyKeep Relationship Service
info.app.version=1.0.0
info.app.description=Relationship management microservice

# =============================================================================
# Database Configuration
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/legacykeep_relationship
spring.datasource.username=${DB_USERNAME:legacykeep}
spring.datasource.password=${DB_PASSWORD:legacykeep}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# =============================================================================
# Redis Configuration
# =============================================================================
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=2000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

# =============================================================================
# Cache Configuration
# =============================================================================
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.enable-statistics=true

# =============================================================================
# JWT Configuration
# =============================================================================
jwt.secret=${JWT_SECRET:legacykeep-secret-key-2024-ultra-secure-jwt-token-for-microservices}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.token-prefix=Bearer 
jwt.token-header=Authorization
jwt.issuer=legacykeep-relationship-service
jwt.audience=legacykeep-users

# =============================================================================
# User Service Configuration
# =============================================================================
user.service.base-url=${USER_SERVICE_URL:http://localhost:8082}
user.service.timeout=${USER_SERVICE_TIMEOUT:5000}

# =============================================================================
# Kafka Configuration
# =============================================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Kafka Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=5
spring.kafka.producer.buffer-memory=33554432

# Kafka Consumer Configuration
spring.kafka.consumer.group-id=relationship-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.trusted.packages=com.legacykeep.*

# =============================================================================
# Management and Monitoring
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# =============================================================================
# Logging Configuration
# =============================================================================
logging.level.com.legacykeep.relationship=${LOG_LEVEL:DEBUG}
logging.level.org.springframework=${SPRING_LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG:TRACE}

# Logging Patterns
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# Swagger/OpenAPI Configuration
# =============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# =============================================================================
# Security Configuration
# =============================================================================
# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

# =============================================================================
# Application Profiles
# =============================================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
